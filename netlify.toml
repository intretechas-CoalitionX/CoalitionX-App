[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# ── Security headers on every response ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "SAMEORIGIN"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Strict-Transport-Security   = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy     = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://news.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# ── No-cache on API routes ────────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    X-Robots-Tag  = "noindex"
